<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>กงล้อนำโชค</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;700;800&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FFF6EA;
    --cream-2:#FFEFD9;
    --ink:#3A2E39;
    --plum:#6B3F69;
    --plum-dark:#4A2B4D;
    --gold:#E8A33D;
    --mint:#B8E0A0;
    --peach:#FFB6A3;
    --lavender:#C9B8E8;
    --butter:#FFD972;
    --sky:#9AD4E8;
    --rose:#D9A6A6;
    --teal:#7FD1C8;
    --shadow: 0 18px 40px rgba(74,43,77,0.25);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at 15% 10%, var(--cream-2) 0%, transparent 45%),
      radial-gradient(circle at 85% 90%, var(--cream-2) 0%, transparent 45%),
      var(--cream);
    font-family:'Sarabun', sans-serif;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 16px;
  }
  .card{
    width:100%;
    max-width:480px;
    text-align:center;
  }
  .eyebrow{
    font-family:'Kanit', sans-serif;
    font-weight:600;
    letter-spacing:0.12em;
    font-size:13px;
    color:var(--plum);
    text-transform:uppercase;
    opacity:0.75;
  }
  h1{
    font-family:'Kanit', sans-serif;
    font-weight:800;
    font-size:clamp(28px, 7vw, 38px);
    margin:6px 0 4px;
    color:var(--plum-dark);
  }
  .sub{
    margin:0 0 28px;
    font-size:15px;
    color:var(--ink);
    opacity:0.7;
  }
  .wheel-wrap{
    position:relative;
    width:min(320px, 80vw);
    height:min(320px, 80vw);
    margin:0 auto 28px;
  }
  .pointer{
    position:absolute;
    top:-6px;
    left:50%;
    transform:translateX(-50%);
    width:0; height:0;
    border-left:16px solid transparent;
    border-right:16px solid transparent;
    border-top:28px solid var(--gold);
    z-index:5;
    filter:drop-shadow(0 3px 4px rgba(0,0,0,0.25));
  }
  .pointer::after{
    content:'';
    position:absolute;
    top:-28px; left:-9px;
    width:18px;height:18px;
    background:var(--gold);
    border-radius:50%;
    border:3px solid var(--cream);
  }
  .ring{
    position:absolute;
    inset:-10px;
    border-radius:50%;
    background:linear-gradient(135deg, var(--gold), var(--plum));
    box-shadow:var(--shadow);
  }
  canvas{
    position:relative;
    border-radius:50%;
    display:block;
  }
  .hub{
    position:absolute;
    top:50%; left:50%;
    width:54px; height:54px;
    margin:-27px 0 0 -27px;
    background:var(--cream);
    border:4px solid var(--gold);
    border-radius:50%;
    z-index:4;
    box-shadow:0 2px 6px rgba(0,0,0,0.2);
    display:flex;align-items:center;justify-content:center;
    font-size:22px;
  }
  button#spinBtn{
    font-family:'Kanit', sans-serif;
    font-weight:700;
    font-size:18px;
    color:var(--cream);
    background:linear-gradient(135deg, var(--plum), var(--plum-dark));
    border:none;
    padding:14px 44px;
    border-radius:999px;
    cursor:pointer;
    box-shadow:0 10px 22px rgba(107,63,105,0.35);
    transition:transform 0.15s ease, box-shadow 0.15s ease, opacity 0.2s ease;
  }
  button#spinBtn:hover:not(:disabled){ transform:translateY(-2px); box-shadow:0 14px 26px rgba(107,63,105,0.4); }
  button#spinBtn:active:not(:disabled){ transform:translateY(0); }
  button#spinBtn:disabled{ opacity:0.55; cursor:not-allowed; transform:none; }

  .legend{
    margin-top:22px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
  }
  .chip{
    font-size:12px;
    font-family:'Sarabun', sans-serif;
    font-weight:600;
    padding:6px 12px;
    border-radius:999px;
    background:rgba(107,63,105,0.08);
    color:var(--plum-dark);
  }

  /* Modal */
  .overlay{
    position:fixed; inset:0;
    background:rgba(58,46,57,0.55);
    display:flex; align-items:center; justify-content:center;
    padding:20px;
    opacity:0; visibility:hidden;
    transition:opacity 0.25s ease;
    z-index:50;
  }
  .overlay.show{ opacity:1; visibility:visible; }
  .modal{
    background:var(--cream);
    border-radius:24px;
    max-width:340px;
    width:100%;
    padding:32px 26px 26px;
    text-align:center;
    box-shadow:var(--shadow);
    transform:translateY(14px) scale(0.96);
    transition:transform 0.25s ease;
  }
  .overlay.show .modal{ transform:translateY(0) scale(1); }
  .modal-icon{ font-size:48px; margin-bottom:8px; }
  .modal h2{
    font-family:'Kanit', sans-serif;
    font-size:22px;
    color:var(--plum-dark);
    margin:0 0 8px;
  }
  .modal p{
    font-size:14px;
    opacity:0.75;
    margin:0 0 22px;
    line-height:1.5;
  }
  .modal button{
    font-family:'Kanit', sans-serif;
    font-weight:700;
    font-size:15px;
    color:var(--cream);
    background:var(--plum);
    border:none;
    padding:11px 30px;
    border-radius:999px;
    cursor:pointer;
  }
  .sr-only{
    position:absolute; width:1px;height:1px;
    overflow:hidden; clip:rect(0,0,0,0);
  }
  @media (prefers-reduced-motion: reduce){
    canvas{ transition:none !important; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="eyebrow">สุ่มของหวานวันนี้</div>
  <h1>กงล้อนำโชค</h1>
  <p class="sub">หมุนวงล้อ 1 ครั้งต่อรอบ ลุ้นรับสิทธิพิเศษเลย!</p>

  <div class="wheel-wrap">
    <div class="ring"></div>
    <div class="pointer"></div>
    <canvas id="wheel" width="320" height="320"></canvas>
    <div class="hub">🍦</div>
  </div>

  <button id="spinBtn">หมุนเลย!</button>

  <div class="legend" id="legend"></div>
  <div id="liveRegion" class="sr-only" role="status" aria-live="polite"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-icon" id="modalIcon">☁️</div>
    <h2 id="modalTitle">ไม่ได้อะไรเลย</h2>
    <p id="modalDesc">เก็บดวงไว้รอบหน้านะ ของหวานยังรออยู่!</p>
    <button id="modalClose">ปิด</button>
  </div>
</div>

<script>
  // ---- ตั้งค่ารางวัล ----
  // ค่าเริ่มต้น: ทุกช่องล็อกไป "ไม่ได้อะไรเลย" ยกเว้น เพิ่มท็อปปิ้ง และ รีฟิลฟรี ที่เปิดให้สุ่มได้จริง 1%
  const segments = [
    { label: ['ส่วนลด', '5 บาท'], color: 'var(--mint)',     hex:'#B8E0A0' },
    { label: ['เพิ่ม', 'ท็อปปิ้ง'], color: 'var(--peach)',   hex:'#FFB6A3' },
    { label: ['1 แถม 1'],          color: 'var(--lavender)',hex:'#C9B8E8' },
    { label: ['ลด 50%'],           color: 'var(--butter)',  hex:'#FFD972' },
    { label: ['ฟรี!'],             color: 'var(--sky)',     hex:'#9AD4E8' },
    { label: ['รีฟิลฟรี', '1 ครั้ง'], color: 'var(--teal)',  hex:'#7FD1C8' },
    { label: ['ไม่ได้', 'อะไรเลย'], color: 'var(--rose)',    hex:'#D9A6A6' }
  ];
  const TOPPING_INDEX = 1;          // เพิ่มท็อปปิ้ง
  const REFILL_INDEX = 5;           // รีฟิลฟรี 1 ครั้ง
  const LOSE_INDEX = segments.length - 1; // ไม่ได้อะไรเลย

  // สุ่มผลลัพธ์แบบมีน้ำหนัก: เพิ่มท็อปปิ้ง 1%, รีฟิลฟรี 1 ครั้ง 1%, ที่เหลือ 98% ไม่ได้อะไรเลย
  function pickResultIndex(){
    const roll = Math.random() * 100;
    if (roll < 1) return TOPPING_INDEX;   // 0% - 1%
    if (roll < 2) return REFILL_INDEX;    // 1% - 2%
    return LOSE_INDEX;                    // 2% - 100%
  }

  const canvas = document.getElementById('wheel');
  const ctx = canvas.getContext('2d');
  const size = canvas.width;
  const cx = size/2, cy = size/2;
  const radius = size/2 - 6;
  const segDeg = 360/segments.length;

  function drawSprinkles(){
    const sprinkleColors = ['#FFD972','#FFB6A3','#C9B8E8','#9AD4E8','#B8E0A0'];
    const count = 26;
    for(let i=0;i<count;i++){
      const a = (i/count)*Math.PI*2;
      const r = radius + 3;
      const x = cx + Math.cos(a)*r;
      const y = cy + Math.sin(a)*r;
      ctx.save();
      ctx.translate(x,y);
      ctx.rotate(a + Math.random()*0.6);
      ctx.fillStyle = sprinkleColors[i % sprinkleColors.length];
      ctx.fillRect(-2, -4, 4, 8);
      ctx.restore();
    }
  }

  function drawWheel(){
    ctx.clearRect(0,0,size,size);
    drawSprinkles();
    segments.forEach((seg, i) => {
      const startDeg = -90 + i*segDeg;
      const endDeg = startDeg + segDeg;
      const startRad = startDeg*Math.PI/180;
      const endRad = endDeg*Math.PI/180;

      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, radius, startRad, endRad);
      ctx.closePath();
      ctx.fillStyle = seg.hex;
      ctx.fill();
      ctx.strokeStyle = '#FFF6EA';
      ctx.lineWidth = 3;
      ctx.stroke();

      // label
      const midDeg = startDeg + segDeg/2;
      const midRad = midDeg*Math.PI/180;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(midRad);
      ctx.fillStyle = '#3A2E39';
      ctx.font = '600 12.5px Kanit, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const lines = seg.label;
      const lineHeight = 14;
      lines.forEach((line, idx) => {
        const yOff = (idx - (lines.length-1)/2) * lineHeight;
        ctx.fillText(line, radius*0.62, yOff);
      });
      ctx.restore();
    });
  }
  drawWheel();

  // legend chips
  const legend = document.getElementById('legend');
  segments.forEach(seg => {
    const chip = document.createElement('span');
    chip.className = 'chip';
    chip.textContent = seg.label.join(' ');
    legend.appendChild(chip);
  });

  // ---- การหมุน ----
  let currentAngle = 0;   // มุมหมุนปัจจุบัน (องศา) เพิ่มขึ้นเรื่อย ๆ ไม่มีลด
  let mode = 'idle';      // 'idle' = หมุนวนช้า ๆ เล่น ๆ | 'spinning' = กำลังหมุนจริง
  let idleRafId = null;
  let lastTs = null;
  const IDLE_SPEED = 6;   // องศาต่อวินาที (หมุนครบรอบทุก ๆ 60 วิ เบา ๆ ไม่รบกวนตา)

  const spinBtn = document.getElementById('spinBtn');
  const overlay = document.getElementById('overlay');
  const modalClose = document.getElementById('modalClose');
  const liveRegion = document.getElementById('liveRegion');

  const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function idleStep(ts){
    if (mode !== 'idle' || prefersReducedMotion) return;
    if (lastTs === null) lastTs = ts;
    const dt = (ts - lastTs) / 1000;
    lastTs = ts;
    currentAngle += IDLE_SPEED * dt;
    canvas.style.transform = `rotate(${currentAngle}deg)`;
    idleRafId = requestAnimationFrame(idleStep);
  }

  function startIdle(){
    mode = 'idle';
    canvas.style.transition = 'none';
    lastTs = null;
    idleRafId = requestAnimationFrame(idleStep);
  }

  function stopIdle(){
    mode = 'spinning';
    if (idleRafId) cancelAnimationFrame(idleRafId);
  }

  function computeTargetRotationMod(index){
    const startDeg = -90 + index*segDeg;
    const midDeg = startDeg + segDeg/2;
    // ต้องการให้ midDeg + R ≡ -90 (mod 360) -> R ≡ -90 - midDeg (mod 360)
    let r = (-90 - midDeg) % 360;
    if (r < 0) r += 360;
    return r;
  }

  function spin(){
    if (mode === 'spinning') return;
    stopIdle();
    spinBtn.disabled = true;

    const resultIndex = pickResultIndex(); // สุ่มผลลัพธ์ตามน้ำหนักที่ตั้งไว้

    const targetMod = computeTargetRotationMod(resultIndex);
    const jitter = (Math.random()*22 - 11); // +-11deg เพื่อให้ดูเป็นธรรมชาติ ไม่ตรงจุดเดิมทุกครั้ง
    const desiredMod = ((targetMod + jitter) % 360 + 360) % 360;

    const currentMod = ((currentAngle % 360) + 360) % 360;
    let increment = desiredMod - currentMod;
    if (increment < 0) increment += 360;

    const extraSpins = 4 + Math.floor(Math.random()*3); // 4-6 รอบเต็มเพื่อความมันส์
    increment += 360*extraSpins;

    const target = currentAngle + increment;

    // สลับจากการไหลแบบ idle (RAF) ไปเป็นการหมุนจริงแบบ transition โดยไม่กระตุก
    canvas.style.transition = prefersReducedMotion ? 'none' : 'transform 4.2s cubic-bezier(0.15,0.85,0.2,1)';
    canvas.getBoundingClientRect(); // force reflow ให้ transition จับค่าใหม่ทัน
    canvas.style.transform = `rotate(${target}deg)`;

    setTimeout(() => {
      currentAngle = target;
      canvas.style.transition = 'none';
      showResult(resultIndex);
      startIdle(); // กลับไปหมุนวนเบา ๆ ต่อจากมุมที่จบไว้ ไม่ใช่ค้างนิ่ง
      spinBtn.disabled = false;
    }, 4300);
  }

  function showResult(index){
    const result = segments[index].label.join(' ');
    const isWin = index !== LOSE_INDEX;
    document.getElementById('modalIcon').textContent = isWin ? '🎉' : '☁️';
    document.getElementById('modalTitle').textContent = result;
    document.getElementById('modalDesc').textContent = isWin
      ? `ยินดีด้วย! รับสิทธิ์ "${result}" ได้เลย 🎊`
      : 'เก็บดวงไว้รอบหน้านะ ของหวานยังรออยู่!';
    overlay.classList.add('show');
    liveRegion.textContent = 'ผลการหมุน: ' + result;
  }

  spinBtn.addEventListener('click', spin);
  modalClose.addEventListener('click', () => overlay.classList.remove('show'));
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('show'); });

  startIdle(); // เริ่มหมุนวนช้า ๆ ตั้งแต่โหลดหน้า ไม่ปล่อยให้ล้อนิ่ง

</script>

</body>
</html>
